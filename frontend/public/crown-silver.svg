<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <!-- Silver base gradient -->
    <linearGradient id="silverBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#E0E0E0"/>
      <stop offset="50%" stop-color="#9E9E9E"/>
      <stop offset="75%" stop-color="#BDBDBD"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>

    <!-- Silver shine overlay -->
    <linearGradient id="silverShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="40%" stop-color="#E0E0E0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9E9E9E" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Band gradient -->
    <linearGradient id="silverBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="30%" stop-color="#BDBDBD"/>
      <stop offset="60%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>

    <!-- Amethyst gem -->
    <radialGradient id="amethystGem" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#EA80FC"/>
      <stop offset="40%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#2E0059"/>
    </radialGradient>

    <!-- Aquamarine gem -->
    <radialGradient id="aquaGem" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="40%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#003740"/>
    </radialGradient>

    <!-- White diamond gem -->
    <radialGradient id="diamondGem" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#CFD8DC"/>
      <stop offset="100%" stop-color="#78909C"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#616161" flood-opacity="0.5"/>
    </filter>

    <!-- Gem glow -->
    <filter id="gemGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="silverEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="30%" stop-color="#E0E0E0"/>
      <stop offset="60%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
  </defs>

  <!-- Outer glow aura -->
  <ellipse cx="100" cy="155" rx="70" ry="10" fill="#B0BEC5" opacity="0.2"/>

  <!-- === CROWN BODY === -->
  <g filter="url(#dropShadow)">

    <!-- Crown base band -->
    <rect x="20" y="120" width="160" height="30" rx="6" ry="6" fill="url(#silverBand)"/>
    <!-- Band top highlight -->
    <rect x="20" y="120" width="160" height="4" rx="3" fill="white" opacity="0.55"/>
    <!-- Band bottom shadow -->
    <rect x="20" y="146" width="160" height="4" rx="3" fill="#212121" opacity="0.3"/>

    <!-- Band engraving lines -->
    <line x1="35" y1="124" x2="35" y2="146" stroke="#9E9E9E" stroke-width="1" opacity="0.6"/>
    <line x1="165" y1="124" x2="165" y2="146" stroke="#9E9E9E" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="124" x2="100" y2="146" stroke="#E0E0E0" stroke-width="0.8" opacity="0.5"/>

    <!-- Main crown body -->
    <polygon points="20,120 20,60 55,90 80,30 100,70 120,30 145,90 180,60 180,120"
             fill="url(#silverBase)"/>
    <polygon points="20,120 20,60 55,90 80,30 100,70 120,30 145,90 180,60 180,120"
             fill="url(#silverShine)"/>
    <polyline points="20,120 20,60 55,90 80,30 100,70 120,30 145,90 180,60 180,120"
              fill="none" stroke="url(#silverEdge)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Inner depth lines -->
    <line x1="20" y1="60" x2="55" y2="90" stroke="#424242" stroke-width="1.5" opacity="0.35"/>
    <line x1="55" y1="90" x2="80" y2="30" stroke="#424242" stroke-width="1.5" opacity="0.35"/>
    <line x1="180" y1="60" x2="145" y2="90" stroke="#424242" stroke-width="1.5" opacity="0.35"/>
    <line x1="145" y1="90" x2="120" y2="30" stroke="#424242" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- === GEMS ON BAND === -->
  <!-- Center gem: Amethyst (large) -->
  <g filter="url(#gemGlow)">
    <polygon points="100,125 110,130 110,140 100,145 90,140 90,130"
             fill="url(#amethystGem)" stroke="#CE93D8" stroke-width="0.8"/>
    <polygon points="100,125 110,130 105,130" fill="white" opacity="0.5"/>
    <polygon points="100,125 90,130 95,130" fill="white" opacity="0.2"/>
  </g>

  <!-- Left gem: Aquamarine -->
  <g filter="url(#gemGlow)">
    <polygon points="50,128 58,132 58,141 50,145 42,141 42,132"
             fill="url(#aquaGem)" stroke="#80DEEA" stroke-width="0.7"/>
    <polygon points="50,128 58,132 54,132" fill="white" opacity="0.4"/>
  </g>

  <!-- Right gem: Diamond -->
  <g filter="url(#gemGlow)">
    <polygon points="150,128 158,132 158,141 150,145 142,141 142,132"
             fill="url(#diamondGem)" stroke="#CFD8DC" stroke-width="0.7"/>
    <polygon points="150,128 158,132 154,132" fill="white" opacity="0.6"/>
  </g>

  <!-- === TIP ORBS === -->
  <!-- Center top orb: Amethyst -->
  <g filter="url(#gemGlow)">
    <circle cx="100" cy="24" r="9" fill="url(#amethystGem)" stroke="#EA80FC" stroke-width="1"/>
    <ellipse cx="96" cy="20" rx="3" ry="2" fill="white" opacity="0.55"/>
  </g>

  <!-- Left outer: Diamond -->
  <g filter="url(#gemGlow)">
    <circle cx="20" cy="58" r="7" fill="url(#diamondGem)" stroke="#ECEFF1" stroke-width="1"/>
    <ellipse cx="17" cy="55" rx="2.5" ry="1.5" fill="white" opacity="0.7"/>
  </g>

  <!-- Right outer: Diamond -->
  <g filter="url(#gemGlow)">
    <circle cx="180" cy="58" r="7" fill="url(#diamondGem)" stroke="#ECEFF1" stroke-width="1"/>
    <ellipse cx="177" cy="55" rx="2.5" ry="1.5" fill="white" opacity="0.7"/>
  </g>

  <!-- Left inner: Aquamarine -->
  <g filter="url(#gemGlow)">
    <circle cx="80" cy="24" r="7" fill="url(#aquaGem)" stroke="#80DEEA" stroke-width="1"/>
    <ellipse cx="77" cy="21" rx="2.5" ry="1.5" fill="white" opacity="0.45"/>
  </g>

  <!-- Right inner: Aquamarine -->
  <g filter="url(#gemGlow)">
    <circle cx="120" cy="24" r="7" fill="url(#aquaGem)" stroke="#80DEEA" stroke-width="1"/>
    <ellipse cx="117" cy="21" rx="2.5" ry="1.5" fill="white" opacity="0.45"/>
  </g>

  <!-- Band dots -->
  <circle cx="70" cy="135" r="3" fill="white" opacity="0.5"/>
  <circle cx="130" cy="135" r="3" fill="white" opacity="0.5"/>
  <circle cx="25" cy="135" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="175" cy="135" r="2.5" fill="white" opacity="0.4"/>

  <!-- Label -->
  <text x="100" y="170" text-anchor="middle"
        font-family="Georgia, serif" font-size="13" font-weight="bold"
        fill="#757575" letter-spacing="3">SILVER</text>
</svg>
