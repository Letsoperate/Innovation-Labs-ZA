<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <defs>
    <!-- Gold base gradient -->
    <linearGradient id="goldBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="75%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>

    <!-- Gold shine overlay -->
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F9A825" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Band gradient -->
    <linearGradient id="goldBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE57F"/>
      <stop offset="30%" stop-color="#FFC107"/>
      <stop offset="60%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>

    <!-- Ruby gem gradient -->
    <radialGradient id="rubyGem" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="40%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#7F0000"/>
    </radialGradient>

    <!-- Sapphire gem gradient -->
    <radialGradient id="sapphireGem" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#82B1FF"/>
      <stop offset="40%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D1B6E"/>
    </radialGradient>

    <!-- Emerald gem gradient -->
    <radialGradient id="emeraldGem" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="40%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#0A3D0A"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#B8860B" flood-opacity="0.55"/>
    </filter>

    <!-- Inner glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gem glow -->
    <filter id="gemGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="goldEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>

  <!-- Outer glow aura -->
  <ellipse cx="100" cy="155" rx="70" ry="10" fill="#FFD700" opacity="0.18"/>

  <!-- === CROWN BODY === -->
  <g filter="url(#dropShadow)">

    <!-- Crown base band -->
    <rect x="20" y="120" width="160" height="30" rx="6" ry="6" fill="url(#goldBand)"/>
    <!-- Band top highlight line -->
    <rect x="20" y="120" width="160" height="4" rx="3" fill="#FFF9C4" opacity="0.5"/>
    <!-- Band bottom shadow line -->
    <rect x="20" y="146" width="160" height="4" rx="3" fill="#4E2800" opacity="0.35"/>

    <!-- Band decorative engraving lines -->
    <line x1="35" y1="124" x2="35" y2="146" stroke="#B8860B" stroke-width="1" opacity="0.6"/>
    <line x1="165" y1="124" x2="165" y2="146" stroke="#B8860B" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="124" x2="100" y2="146" stroke="#FFD700" stroke-width="0.8" opacity="0.5"/>

    <!-- Main crown body (the rising part) -->
    <!-- Left side fill -->
    <polygon points="20,120 20,60 55,90 80,30 100,70 120,30 145,90 180,60 180,120"
             fill="url(#goldBase)" />
    <!-- Shine overlay on body -->
    <polygon points="20,120 20,60 55,90 80,30 100,70 120,30 145,90 180,60 180,120"
             fill="url(#goldShine)" />

    <!-- Crown outline / border for crispness -->
    <polyline points="20,120 20,60 55,90 80,30 100,70 120,30 145,90 180,60 180,120"
              fill="none" stroke="url(#goldEdge)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Inner shadow on points for depth -->
    <!-- Left spike shadow -->
    <line x1="20" y1="60" x2="55" y2="90" stroke="#7A5200" stroke-width="1.5" opacity="0.4"/>
    <line x1="55" y1="90" x2="80" y2="30" stroke="#7A5200" stroke-width="1.5" opacity="0.4"/>
    <!-- Right spike shadow -->
    <line x1="180" y1="60" x2="145" y2="90" stroke="#7A5200" stroke-width="1.5" opacity="0.4"/>
    <line x1="145" y1="90" x2="120" y2="30" stroke="#7A5200" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- === GEMS ON BAND === -->
  <!-- Center gem: Ruby (large, hexagonal) -->
  <g filter="url(#gemGlow)">
    <polygon points="100,125 110,130 110,140 100,145 90,140 90,130"
             fill="url(#rubyGem)" stroke="#FF1744" stroke-width="0.8"/>
    <!-- Gem facet highlight -->
    <polygon points="100,125 110,130 105,130" fill="white" opacity="0.45"/>
    <polygon points="100,125 90,130 95,130" fill="white" opacity="0.2"/>
  </g>

  <!-- Left gem: Sapphire -->
  <g filter="url(#gemGlow)">
    <polygon points="50,128 58,132 58,141 50,145 42,141 42,132"
             fill="url(#sapphireGem)" stroke="#1565C0" stroke-width="0.7"/>
    <polygon points="50,128 58,132 54,132" fill="white" opacity="0.4"/>
  </g>

  <!-- Right gem: Emerald -->
  <g filter="url(#gemGlow)">
    <polygon points="150,128 158,132 158,141 150,145 142,141 142,132"
             fill="url(#emeraldGem)" stroke="#2E7D32" stroke-width="0.7"/>
    <polygon points="150,128 158,132 154,132" fill="white" opacity="0.4"/>
  </g>

  <!-- === TIP ORBS (gems at spike tips) === -->
  <!-- Center top orb: large ruby -->
  <g filter="url(#gemGlow)">
    <circle cx="100" cy="24" r="9" fill="url(#rubyGem)" stroke="#FF8A80" stroke-width="1"/>
    <ellipse cx="96" cy="20" rx="3" ry="2" fill="white" opacity="0.5"/>
  </g>

  <!-- Left outer tip: sapphire orb -->
  <g filter="url(#gemGlow)">
    <circle cx="20" cy="58" r="7" fill="url(#sapphireGem)" stroke="#82B1FF" stroke-width="1"/>
    <ellipse cx="17" cy="55" rx="2.5" ry="1.5" fill="white" opacity="0.45"/>
  </g>

  <!-- Right outer tip: sapphire orb -->
  <g filter="url(#gemGlow)">
    <circle cx="180" cy="58" r="7" fill="url(#sapphireGem)" stroke="#82B1FF" stroke-width="1"/>
    <ellipse cx="177" cy="55" rx="2.5" ry="1.5" fill="white" opacity="0.45"/>
  </g>

  <!-- Left inner tip: emerald orb -->
  <g filter="url(#gemGlow)">
    <circle cx="80" cy="24" r="7" fill="url(#emeraldGem)" stroke="#A5D6A7" stroke-width="1"/>
    <ellipse cx="77" cy="21" rx="2.5" ry="1.5" fill="white" opacity="0.45"/>
  </g>

  <!-- Right inner tip: emerald orb -->
  <g filter="url(#gemGlow)">
    <circle cx="120" cy="24" r="7" fill="url(#emeraldGem)" stroke="#A5D6A7" stroke-width="1"/>
    <ellipse cx="117" cy="21" rx="2.5" ry="1.5" fill="white" opacity="0.45"/>
  </g>

  <!-- === DECORATIVE DOTS on band === -->
  <circle cx="70" cy="135" r="3" fill="#FFF9C4" opacity="0.7"/>
  <circle cx="130" cy="135" r="3" fill="#FFF9C4" opacity="0.7"/>
  <circle cx="25" cy="135" r="2.5" fill="#FFF9C4" opacity="0.5"/>
  <circle cx="175" cy="135" r="2.5" fill="#FFF9C4" opacity="0.5"/>

  <!-- === LABEL === -->
  <text x="100" y="170" text-anchor="middle"
        font-family="Georgia, serif" font-size="13" font-weight="bold"
        fill="#B8860B" letter-spacing="3">GOLD</text>
</svg>
